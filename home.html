<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwing + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- faveIcon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
    <title> GitHub Issue Traker / Home</title>
</head>

<header>
    <div id="header-section" class="w-11/12 mx-auto shadow-sm flex justify-between items-center py-6">
        <div id="logo" class="logo flex justify-center items-center gap-1">
            <img src="./assets/github-logo.png" alt="" class="w-[50px]">
            <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
        </div>
        <div id="search" class="search flex justify-center items-center gap-2">
            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input id="searchInput" type="search" required placeholder="Search issues..." />

            </label>
            <button id="searchButton" class="btn bg-[#4A00FF] text-[white]"><span>+</span>New Issue</button>
        </div>
    </div>
</header>

<main>
    <section id="button-section" class="  w-10/12 mx-auto flex items-center gap-4 p-6 shadow-lg mt-10">
        <button id="allIssueBtn" class="btn btn-outline text-gray primary-color py-5 px-7">All</button>
        <button id="openIssueBtn" class="btn btn-outline text-gray py-5 px-7">Open</button>
        <button id="closedIssueBtn" class="btn btn-outline text-gray py-5 px-7">Closed</button>
    </section>


    <section id="issueCount" class="w-10/12 mx-auto m-6 border-b-[#48484b] shadow-xl">
        <div class="countDiv flex items-center justify-between gap-4 p-4">
            <div class="count-wrap flex items-center gap-4">
                <img src="./assets/Aperture.png" alt="">
                <div class="countTotal">
                    <div class="flex items-center gap-3">
                        <p id="totalIssueCount" class="  md:text-xl">0</p>
                        <span class="text-xl">Issues</span>
                    </div>

                    <p class=" text-[16px] md:text-xl">Track and manage your project issues</p>
                </div>
            </div>

            <div class="iconDiv flex items-center gap-2">
                <div class="icon-open flex items-center gap-2">
                    <div class="icon-circle bg-[#00A96E] rounded-full w-4 h-4"></div>
                    <div class="icon-text text-2xl font-medium">Open</div>
                </div>
                <div class="icon-open flex items-center gap-2">
                    <div class="icon-circle bg-[#A855F7] rounded-full w-4 h-4"></div>
                    <div class="icon-text text-2xl font-medium">Closed</div>
                </div>
            </div>

        </div>

    </section>
    <!-- loading spiner -->
    <div id="loadingSpiner" class="w-[60vh] mx-auto flex hidden justify-center items-center">
        <span class="loading loading-spinner loading-xl"></span>
    </div>
    <section id="allIssueContainer" class="w-10/12 mx-auto m-6 grid grid-cols-2 md:grid-cols-4 gap-3">


    </section>
    <!-- Modal section -->


    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
    <dialog id="issuTrakerModal"  class="modal">
        <div class="modal-box">
            <div class="modal-wrap p-8">
                <div class="modal-heading">
                    <h1 id="modalTitle" class="text-2xl font-bold">Fix broken image uploads</h1>
                </div>
                <div class="modal-status flex items-center gap-4 my-5">
                    <div><button id="modalStatus" class="btn btn-primary">status</button></div>
                    <h2 id="modalAuthorStatusName"> Opened by: Authorname</h2>
                    <span id="modalStatusDate" class="modalStatusDate">Date</span>
                </div>

                <div id="cact-btn" class="flex  items-center gap-3 my-6">
                    <button id="bugBtn" class="btn rounded border-[#FECACA] text-[#EF4444] bg-[#FEECEC] "><span><img
                                src="./assets/kite.png" alt=""></span>
                        Bug</button>
                    <button class="btn rounded text-[#D97706] bg-[#FFF8DB] border-[#FDE68A]"><span><img
                                src="./assets/circle.png" alt=""></span>
                        wanted</button>

                </div>
                <div class="discription my-4">
                    <p id="modalDescription" class="line-clamp-2">Lorem ipsum dolor, sit amet consectetur adipisicing.</p>
                </div>

                <div class="assignPerson flex justify-between items-center">
                    <div class="assigne space-y-2">
                        <div class="">Assigne:</div>
                        <div id="authorName">Authorname:</div>
                      
                    </div>
                    <div class="property space-y-2">
                       <div>Property:</div>
                       <div><button id="modalProperty" class="btn btn-secondary">High</button></div>
                       
                    </div>
                </div>


            </div>


            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>


</main>


<script src="./script.js"></script>

<body>

</body>

</html>
